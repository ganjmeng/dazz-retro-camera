name: Create GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release and Upload Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          body: |
            ## DAZZ Retro Camera ${{ github.ref_name }}

            This is an automated release.

            ### Artifacts
            - Android APK and AAB are available in the Actions tab under the **Android Release Build** workflow.
            - iOS IPA is available in the Actions tab under the **iOS Release Build** workflow (if certificates were provided).

            Please download the artifacts from the workflow runs and attach them here.
