name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests and Lints
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.x'
          cache: true

      - name: Install dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Analyze code
        working-directory: ./flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        working-directory: ./flutter_app
        run: flutter test

  android-build-check:
    name: Android Build Check (Debug)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.x'
          cache: true

      - name: Install dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Build Android APK (Debug)
        working-directory: ./flutter_app
        run: flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-ci
          path: flutter_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  ios-build-check:
    name: iOS Build Check (No Sign)
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.32.x'
          cache: true

      - name: Install dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Build iOS App (Debug - No Sign)
        working-directory: ./flutter_app
        run: flutter build ios --debug --no-codesign
