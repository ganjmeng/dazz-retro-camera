name: Android Release Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android AAB & APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo "$ENCODED_KEYSTORE" | base64 --decode > ./flutter_app/android/app/upload-keystore.jks
            echo "Keystore decoded successfully."
          else
            echo "Keystore secret not found. Will use debug signing."
          fi

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \
              "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
              > ./flutter_app/android/key.properties
            echo "key.properties created."
          else
            echo "Signing secrets not found. Building with debug signing."
          fi

      - name: Build Android App Bundle (AAB)
        working-directory: ./flutter_app
        run: flutter build appbundle --release

      - name: Build Android APK
        working-directory: ./flutter_app
        run: flutter build apk --release

      - name: Rename artifacts
        run: |
          TAG="${{ github.ref_name }}"
          cp flutter_app/build/app/outputs/bundle/release/app-release.aab \
             flutter_app/build/app/outputs/bundle/release/dazz-${TAG}.aab
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             flutter_app/build/app/outputs/flutter-apk/dazz-${TAG}.apk
          echo "AAB_PATH=flutter_app/build/app/outputs/bundle/release/dazz-${TAG}.aab" >> $GITHUB_ENV
          echo "APK_PATH=flutter_app/build/app/outputs/flutter-apk/dazz-${TAG}.apk" >> $GITHUB_ENV

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-appbundle-${{ github.ref_name }}
          path: ${{ env.AAB_PATH }}
          retention-days: 30

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APK_PATH }}
            ${{ env.AAB_PATH }}
          name: "DAZZ ${{ github.ref_name }}"
          body: |
            ## DAZZ Retro Camera ${{ github.ref_name }}

            ### 下载
            - **APK**：直接安装到 Android 设备
            - **AAB**：用于上传 Google Play

            ### 变更
            ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
